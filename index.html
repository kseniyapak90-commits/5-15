<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>xinwaychinese · 双面闪卡 (军事/思辨词汇)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f1ebe5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Times New Roman', Times, serif;
            padding: 12px;
        }

        .card-frame {
            width: 100%;
            max-width: 700px;
            background-color: #fdf8f2;
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.1), 0 4px 10px rgba(0, 0, 0, 0.05);
            padding: 24px 20px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid #e6d5b8;
        }

        /* 可爱图标 + 词语练习 */
        .header-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
            width: 100%;
        }

        .icon-badge {
            background: #ffb347;
            border-radius: 60px;
            padding: 8px 18px 8px 15px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 0 #c15a1c;
            border: 2px solid #a04500;
        }

        .icon-badge span {
            font-size: 2.2rem;
            line-height: 1;
            filter: drop-shadow(2px 2px 0 #f28500);
        }

        .icon-badge h1 {
            font-size: 1.9rem;
            font-family: '楷体', 'KaiTi', '华文楷体', 'STKaiti', serif;
            color: #2d1b0c;
            letter-spacing: 3px;
            font-weight: 600;
            margin-right: 5px;
            text-shadow: 1px 1px 0 #fce5b1;
        }

        /* 大黑板区域 — 占页面2/3左右 */
        .blackboard-area {
            width: 100%;
            flex: 2 1 auto;
            min-height: 380px;
            max-height: 60vh;
            aspect-ratio: 4 / 3;
            margin: 10px 0 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 黑板卡片容器 — 正确的3D翻转设置 */
        .flip-container {
            width: 100%;
            height: 100%;
            min-height: 300px;
            background-color: transparent;
            perspective: 2000px;
            cursor: pointer;
            border-radius: 30px;
            box-shadow: 0 20px 0 #3a4a3f, 0 25px 30px -5px rgba(0, 0, 0, 0.4);
        }

        .flip-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.5s;
            transform-style: preserve-3d;
            border-radius: 30px;
        }

        .flip-inner.flipped {
            transform: rotateY(180deg);
        }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            background: #2b4b3a;
            background-image: radial-gradient(circle at 10px 10px, #3f6b4f 2px, transparent 2px),
                                radial-gradient(circle at 30px 25px, #3f6b4f 2px, transparent 2px);
            background-size: 60px 60px, 120px 120px;
            border: 12px solid #6f4f2e;
            border-radius: 40px;
            box-shadow: inset 0 -5px 0 #3d5a3d, inset 0 5px 10px rgba(255, 255, 240, 0.3), 0 10px 0 #4d3e2b;
            padding: 25px 20px 20px;
            display: flex;
            flex-direction: column;
            color: #f5f2da;
            font-family: '楷体', 'KaiTi', 'STKaiti', serif;
            overflow-y: auto;
        }

        .back {
            transform: rotateY(180deg);
        }

        /* 固定左上角 xinwaychinese (卡片内部) */
        .xinway-tag {
            position: absolute;
            top: 12px;
            left: 18px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: #f9e0a0;
            text-shadow: 2px 2px 0 #3a5e3a;
            letter-spacing: 1px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.2);
            padding: 2px 8px 2px 6px;
            border-radius: 40px;
            backdrop-filter: blur(1px);
            border: 1px dashed #e8c37b;
            opacity: 0.95;
            pointer-events: none;
        }

        /* 正面内容排版 */
        .word-area {
            flex: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-top: 25px;
            font-family: '楷体', 'KaiTi', 'STKaiti', serif;
            pointer-events: none;
        }

        .chinese-word {
            font-size: 7vw;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 0.2rem;
            text-shadow: 4px 4px 0 #1f3a27;
            color: #fff9e0;
            word-break: break-word;
            max-width: 90%;
        }

        .example-sentence {
            font-size: 3.8vw;
            font-family: '楷体', 'KaiTi', 'STKaiti', serif;
            background: rgba(255, 250, 210, 0.15);
            padding: 10px 14px;
            border-radius: 60px;
            border-left: 5px solid #ffd966;
            color: #fef9d7;
            margin: 8px 0 5px;
            max-width: 95%;
            word-break: break-word;
            box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.5);
            line-height: 1.4;
        }

        /* 背面内容排版 */
        .back-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            width: 100%;
            font-family: 'Times New Roman', Times, serif;
            margin-top: 25px;
            gap: 0.6rem;
            color: #f5f0cf;
            pointer-events: none;
        }

        .pinyin {
            font-size: 5vw;
            font-weight: 600;
            font-family: 'Times New Roman', Times, serif;
            background: #3b5e4b;
            padding: 5px 20px;
            border-radius: 50px;
            border: 2px solid #c9ae74;
            width: fit-content;
        }

        .pos {
            font-size: 4.2vw;
            font-family: 'Times New Roman', Times, serif;
            background: #637a54;
            padding: 6px 22px;
            border-radius: 40px;
            color: #fef7cd;
            font-weight: 500;
        }

        .russian {
            font-size: 4vw;
            font-family: 'Times New Roman', Times, serif;
            background: #2a4230;
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px dashed #f1cf8a;
            max-width: 95%;
            word-break: break-word;
        }

        /* 按钮栏 */
        .button-bar {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .action-btn {
            background: #f3d9a4;
            border: 4px solid #ba8b4a;
            color: #3d2b13;
            font-size: 1.7rem;
            font-weight: bold;
            padding: 12px 35px;
            border-radius: 60px;
            box-shadow: 0 7px 0 #7b5a38;
            cursor: pointer;
            transition: all 0.06s linear;
            font-family: 'Times New Roman', Times, serif;
            letter-spacing: 2px;
            min-width: 140px;
            text-align: center;
        }

        .action-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #7b5a38;
        }

        .action-btn:disabled {
            opacity: 0.4;
            transform: translateY(3px);
            box-shadow: 0 4px 0 #7b5a38;
            pointer-events: none;
        }

        .small-btn {
            font-size: 1.5rem;
            padding: 8px 20px;
            min-width: 110px;
        }

        .nav-btn {
            background: #b6d7a8;
            border-color: #3f7842;
            box-shadow: 0 6px 0 #2a5e2a;
            color: #1f3f1f;
        }

        .hidden {
            display: none !important;
        }

        /* 挑战成功界面 */
        .success-message {
            width: 100%;
            height: 100%;
            background: #2b4b3a;
            border-radius: 40px;
            border: 12px solid #6f4f2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            color: #ffd966;
            font-family: '楷体', 'KaiTi', serif;
            box-shadow: inset 0 0 30px #c9ae74, 0 15px 0 #4d3e2b;
        }

        .success-message span {
            font-size: 5vw;
            font-weight: bold;
            background: #5f4230;
            padding: 10px 35px;
            border-radius: 60px;
            border: 4px solid #f9cb7b;
        }

        /* 手机微调 */
        @media (max-width: 500px) {
            .chinese-word {
                font-size: 14vw;
            }

            .example-sentence {
                font-size: 5vw;
            }

            .pinyin {
                font-size: 6vw;
            }

            .pos {
                font-size: 5.5vw;
            }

            .russian {
                font-size: 5vw;
            }

            .action-btn {
                font-size: 1.4rem;
                padding: 10px 15px;
                min-width: 110px;
            }

            .xinway-tag {
                font-size: 1.1rem;
                top: 6px;
                left: 10px;
            }

            .blackboard-area {
                min-height: 320px;
            }
        }

        /* 汉字保持楷体 */
        .chinese-word,
        .example-sentence {
            font-family: '楷体', 'KaiTi', '华文楷体', 'STKaiti', serif;
        }

        /* 字母新罗马 */
        .pinyin,
        .pos,
        .russian,
        .action-btn,
        .xinway-tag {
            font-family: 'Times New Roman', Times, serif;
        }
    </style>
</head>
<body>
<div class="card-frame">
    <!-- 可爱图标 + 词语练习 -->
    <div class="header-icon">
        <div class="icon-badge">
            <span>⚔️📜</span>
            <h1>词语练习</h1>
        </div>
    </div>

    <!-- 大黑板区域 -->
    <div class="blackboard-area" id="blackboardArea">
        <!-- 动态内容：闪卡容器 或 挑战成功界面 -->
        <div id="flashcardContainer" style="width: 100%; height: 100%;">
            <div class="flip-container" id="flipContainer">
                <div class="flip-inner" id="flipInner">
                    <!-- 正面 -->
                    <div class="front" id="cardFront">
                        <span class="xinway-tag">xinwaychinese</span>
                        <div class="word-area" id="frontContent">
                            <div class="chinese-word" id="wordDisplay"></div>
                            <div class="example-sentence" id="sentenceDisplay"></div>
                        </div>
                    </div>
                    <!-- 背面 -->
                    <div class="back" id="cardBack">
                        <span class="xinway-tag">xinwaychinese</span>
                        <div class="back-content" id="backContent">
                            <div class="pinyin" id="pinyinDisplay"></div>
                            <div class="pos" id="posDisplay"></div>
                            <div class="russian" id="ruDisplay"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="successScreen" class="success-message hidden">
            <span>🎉 挑战成功 🎉</span>
            <button class="action-btn small-btn" id="restartFromSuccess">重新开始</button>
        </div>
    </div>

    <!-- 按钮区域 -->
    <div class="button-bar" id="buttonBar">
        <button class="action-btn" id="startBtn">开始</button>
        <button class="action-btn nav-btn hidden" id="prevBtn">◀ 上一个</button>
        <button class="action-btn nav-btn hidden" id="nextBtn">下一个 ▶</button>
        <button class="action-btn small-btn hidden" id="restartBtn">重新开始</button>
    </div>
</div>

<script>
    (function() {
        // 苹果设备检测与兼容处理
        const isApple = /iPhone|iPad|iPod|Macintosh/i.test(navigator.userAgent);
        if (isApple) {
            console.log('检测到苹果设备，启用兼容模式');
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initApp);
            } else {
                initApp();
            }
        } else {
            initApp();
        }

        function initApp() {
            // ---------- 词语数据 (根据用户提供的列表，共约40个) ----------
            const cards = [
                { word: "纸上谈兵", pinyin: "zhǐshàng-tánbīng", pos: "идиома", ru: "быть кабинетным стратегом", ex: "光会纸上谈兵可不行。" },
                { word: "军事", pinyin: "jūnshì", pos: "сущ.", ru: "военное дело", ex: "他喜欢研究军事。" },
                { word: "敌人", pinyin: "dírén", pos: "сущ.", ru: "враг", ex: "我们要战胜敌人。" },
                { word: "理论", pinyin: "lǐlùn", pos: "сущ.", ru: "теория", ex: "理论很重要。" },
                { word: "作战", pinyin: "zuòzhàn", pos: "гл.", ru: "вести бой", ex: "士兵在作战。" },
                { word: "毛病", pinyin: "máobìng", pos: "сущ.", ru: "недостаток", ex: "这台电脑有毛病。" },
                { word: "道理", pinyin: "dàolǐ", pos: "сущ.", ru: "принцип, смысл", ex: "他讲的道理很对。" },
                { word: "迟早", pinyin: "chízǎo", pos: "нареч.", ru: "рано или поздно", ex: "迟早你会明白。" },
                { word: "军队", pinyin: "jūnduì", pos: "сущ.", ru: "армия", ex: "军队保护国家。" },
                { word: "派", pinyin: "pài", pos: "гл.", ru: "посылать, назначать", ex: "公司派他去出差。" },
                { word: "弱", pinyin: "ruò", pos: "прил.", ru: "слабый", ex: "他的身体很弱。" },
                { word: "形势", pinyin: "xíngshì", pos: "сущ.", ru: "ситуация", ex: "形势很复杂。" },
                { word: "命令", pinyin: "mìnglìng", pos: "гл./сущ.", ru: "приказывать; приказ", ex: "他接到了命令。" },
                { word: "守", pinyin: "shǒu", pos: "гл.", ru: "охранять, защищать", ex: "守卫边疆。" },
                { word: "阵地", pinyin: "zhèndì", pos: "сущ.", ru: "позиция", ex: "士兵坚守阵地。" },
                { word: "绝对", pinyin: "juéduì", pos: "нареч./прил.", ru: "абсолютно; абсолютный", ex: "这是绝对正确的。" },
                { word: "主动", pinyin: "zhǔdòng", pos: "прил.", ru: "активный, по своей инициативе", ex: "你要主动一些。" },
                { word: "挑战", pinyin: "tiǎozhàn", pos: "гл./сущ.", ru: "бросать вызов; вызов", ex: "他接受挑战。" },
                { word: "骂", pinyin: "mà", pos: "гл.", ru: "ругать", ex: "不要骂人。" },
                { word: "胆小鬼", pinyin: "dǎnxiǎoguǐ", pos: "сущ.", ru: "трус", ex: "你真是个胆小鬼。" },
                { word: "胜利", pinyin: "shènglì", pos: "гл.", ru: "одержать победу", ex: "我们取得了胜利。" },
                { word: "调动", pinyin: "diàodòng", pos: "гл.", ru: "переводить, перемещать", ex: "他被调动到新部门。" },
                { word: "散布", pinyin: "sànbù", pos: "гл.", ru: "распространять", ex: "散布谣言是不对的。" },
                { word: "谣言", pinyin: "yáoyán", pos: "сущ.", ru: "слух, сплетня", ex: "不要相信谣言。" },
                { word: "上当", pinyin: "shàngdàng", pos: "гл.", ru: "попасться на удочку", ex: "他上当了。" },
                { word: "再三", pinyin: "zàisān", pos: "нареч.", ru: "снова и снова", ex: "他再三叮嘱我。" },
                { word: "阻止", pinyin: "zǔzhǐ", pos: "гл.", ru: "останавливать", ex: "阻止他做傻事。" },
                { word: "任命", pinyin: "rènmìng", pos: "гл.", ru: "назначать на должность", ex: "他被任命为经理。" },
                { word: "独立", pinyin: "dúlì", pos: "гл.", ru: "быть самостоятельным", ex: "孩子要学会独立。" },
                { word: "资格", pinyin: "zīgé", pos: "сущ.", ru: "квалификация, право", ex: "他有资格参加比赛。" },
                { word: "糊涂", pinyin: "hútú", pos: "прил.", ru: "бестолковый", ex: "他今天很糊涂。" },
                { word: "公元", pinyin: "gōngyuán", pos: "сущ.", ru: "наша эра", ex: "公元2024年。" },
                { word: "盲目", pinyin: "mángmù", pos: "прил.", ru: "слепой, невежественный", ex: "盲目跟风不好。" },
                { word: "轻视", pinyin: "qīngshì", pos: "гл.", ru: "презирать, недооценивать", ex: "不要轻视对手。" },
                { word: "方案", pinyin: "fāng'àn", pos: "сущ.", ru: "план, проект", ex: "我们讨论了一个新方案。" },
                { word: "进攻", pinyin: "jìngōng", pos: "гл.", ru: "атаковать, наступать", ex: "军队开始进攻。" },
                { word: "宝贵", pinyin: "bǎoguì", pos: "прил.", ru: "драгоценный, ценный", ex: "时间很宝贵。" },
                { word: "讽刺", pinyin: "fēngcì", pos: "гл.", ru: "высмеивать", ex: "他在讽刺我。" },
                { word: "灵活", pinyin: "línghuó", pos: "прил.", ru: "гибкий, подвижный", ex: "思维要灵活。" }
            ];

            // DOM 元素
            const startBtn = document.getElementById('startBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const restartBtn = document.getElementById('restartBtn');
            const restartFromSuccess = document.getElementById('restartFromSuccess');
            const flipContainer = document.getElementById('flipContainer');
            const flipInner = document.getElementById('flipInner');
            const flashcardContainer = document.getElementById('flashcardContainer');
            const successScreen = document.getElementById('successScreen');
            const wordDisplay = document.getElementById('wordDisplay');
            const sentenceDisplay = document.getElementById('sentenceDisplay');
            const pinyinDisplay = document.getElementById('pinyinDisplay');
            const posDisplay = document.getElementById('posDisplay');
            const ruDisplay = document.getElementById('ruDisplay');

            // 状态变量
            let currentIndex = 0;
            let gameActive = false;

            function updateCardContent() {
                if (currentIndex >= 0 && currentIndex < cards.length) {
                    const card = cards[currentIndex];
                    wordDisplay.textContent = card.word;
                    sentenceDisplay.textContent = card.ex;
                    pinyinDisplay.textContent = card.pinyin;
                    posDisplay.textContent = card.pos;
                    ruDisplay.textContent = card.ru;
                }
            }

            function resetFlip() {
                flipInner.classList.remove('flipped');
            }

            function showScreenByIndex() {
                if (currentIndex >= cards.length) {
                    flashcardContainer.classList.add('hidden');
                    successScreen.classList.remove('hidden');
                    restartBtn.classList.remove('hidden'); 
                    prevBtn.classList.add('hidden');
                    nextBtn.classList.add('hidden');
                    startBtn.classList.add('hidden');
                } else {
                    flashcardContainer.classList.remove('hidden');
                    successScreen.classList.add('hidden');
                    updateCardContent();
                    resetFlip();
                    if (gameActive) {
                        startBtn.classList.add('hidden');
                        prevBtn.classList.remove('hidden');
                        nextBtn.classList.remove('hidden');
                        restartBtn.classList.remove('hidden');
                    } else {
                        startBtn.classList.remove('hidden');
                        prevBtn.classList.add('hidden');
                        nextBtn.classList.add('hidden');
                        restartBtn.classList.add('hidden');
                    }
                }
            }

            function startGame() {
                gameActive = true;
                if (currentIndex >= cards.length) currentIndex = 0;
                showScreenByIndex();
            }

            function restartGame() {
                currentIndex = 0;
                gameActive = true;
                resetFlip();
                showScreenByIndex();
            }

            function goPrev() {
                if (!gameActive) return;
                if (currentIndex > 0) {
                    currentIndex--;
                    showScreenByIndex();
                }
            }

            function goNext() {
                if (!gameActive) return;
                if (currentIndex < cards.length - 1) {
                    currentIndex++;
                    showScreenByIndex();
                } else if (currentIndex === cards.length - 1) {
                    currentIndex++;
                    showScreenByIndex();
                }
            }

            function handleBlackboardClick(e) {
                if (!gameActive || currentIndex >= cards.length) return;
                if (flipInner.classList.contains('flipped')) {
                    flipInner.classList.remove('flipped');
                } else {
                    flipInner.classList.add('flipped');
                }
            }

            // 事件绑定
            flipContainer.addEventListener('click', handleBlackboardClick);

            startBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                startGame();
            });
            prevBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                goPrev();
            });
            nextBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                goNext();
            });
            restartBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                restartGame();
            });
            restartFromSuccess.addEventListener('click', (e) => {
                e.stopPropagation();
                restartGame();
            });

            // 初始状态：未激活，显示第一张卡片
            currentIndex = 0;
            gameActive = false;
            showScreenByIndex();
            resetFlip();
        }
    })();
</script>
</body>
</html>
